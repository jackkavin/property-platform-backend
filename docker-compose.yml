version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: property-platform-api:latest
    container_name: property_api
    restart: unless-stopped
    env_file: .env
    ports:
      - '3000:3000'
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - property_net
    deploy:
      resources:
        limits:
          memory: 512M

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: property-platform-api:latest
    container_name: property_worker
    restart: unless-stopped
    command: ['node', 'dist/src/worker.js']
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - property_net
    deploy:
      resources:
        limits:
          memory: 256M

  mysql:
    image: mysql:8.0
    container_name: property_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change_me_root_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - property_net
    # Do NOT publish 3306 externally in production - internal network only.

  redis:
    image: redis:7-alpine
    container_name: property_redis
    restart: unless-stopped
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD}', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - property_net

volumes:
  mysql_data:
  redis_data:

networks:
  property_net:
    driver: bridge
