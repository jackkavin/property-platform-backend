name: CI

# Runs on every push and PR to main - catches broken builds/tests before
# they ever reach a deployment step, and before a teammate pulls broken code.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    # Spin up real MySQL + Redis service containers for this CI run, so
    # tests that need them (not just the pure-function tests we ship today)
    # have somewhere real to run against as the test suite grows.
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_root_password
          MYSQL_DATABASE: property_platform_test
          MYSQL_USER: property_app
          MYSQL_PASSWORD: ci_test_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: property_app
      DB_PASSWORD: ci_test_password
      DB_NAME: property_platform_test
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      CRM_WEBHOOK_SECRET: ci_test_webhook_secret_12345
      WPGRAPHQL_ENDPOINT: https://example.com/graphql

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint
        continue-on-error: true # style issues shouldn't block CI, but are visible in the run log

      - name: Run migrations against the CI database
        run: npm run migrate

      - name: Type-check & build
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: lint-test-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Builds the production image to verify the Dockerfile itself is
      # valid and produces a runnable image - does NOT push anywhere in
      # this workflow. Wire up a registry login + push step here (Docker
      # Hub, GHCR, etc.) once you're ready to automate deployment fully.
      - name: Build Docker image (verification only)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          tags: property-platform-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
