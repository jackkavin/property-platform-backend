# /etc/nginx/sites-available/property-platform
# Reverse proxy: Internet -> Nginx (443) -> PM2/Node cluster (127.0.0.1:3000)

# First line of DoS defense, ahead of the app's own Redis rate limiter -
# rejects abusive traffic before it even consumes a Node event-loop tick.
limit_req_zone $binary_remote_addr zone=api_general:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=api_enquiry:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=addr:10m;

# Redirect all plain HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.yourdomain.com;

    # Let's Encrypt HTTP-01 challenge path must stay reachable over plain HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Defense-in-depth headers at the edge, in addition to helmet() in the app
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 1m;
    limit_conn addr 20;

    access_log /var/log/nginx/property-platform.access.log;
    error_log  /var/log/nginx/property-platform.error.log warn;

    location /health {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
    }

    location /api/enquiry {
        limit_req zone=api_enquiry burst=3 nodelay;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params_property.conf;
    }

    location /api/ {
        limit_req zone=api_general burst=40 nodelay;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params_property.conf;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params_property.conf;
    }
}
